<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Anime Quiz Pro</title>
<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
text-align:center;
padding:20px;
}
.card{
background:#222;
border-radius:15px;
padding:20px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px #000;
}
button{
background:#ff9800;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#ff5722;
}
</style>
</head>

<body>

<div class="card">
<h1>🎌 Anime Quiz Pro</h1>

<p id="question">
من هو الهوكاجي السابع؟
</p>

<button onclick="correct()">ناروتو أوزوماكي</button><br><br>
<button onclick="wrong()">ساسكي أوتشيها</button><br><br>
<button onclick="wrong()">كاكاشي</button><br><br>
<button onclick="wrong()">إيتاتشي</button>

<h2 id="score">النقاط: 0</h2>

</div>

<script>

let score=0;

function correct(){
score++;
document.getElementById("score").innerHTML="النقاط: "+score;
alert("إجابة صحيحة ✅");
}

function wrong(){
alert("إجابة خاطئة ❌");
}

</script>

</body>
</html>
